app:
  name: base
  env: development
  log_level: debug

http:
  address: ":8080"
  read_timeout: 15s
  read_header_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 20s
  trusted_proxies: []

database:
  url: postgres://base_user:base_password@localhost:5432/base?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  conn_max_idle_time: 2m

session:
  cookie_name: base_session
  lifetime: 24h
  idle_timeout: 12h
  same_site: lax
  secure: false
  http_only: true
  persist: true

security:
  allowed_origins: []
  csrf_secure: false
  encryption_key: 0123456789abcdef0123456789abcdef
  password_reset_ttl: 1h
  email_verification_ttl: 24h
  recovery_ttl: 30m
  failed_login_threshold: 5
  failed_login_window: 15m
  inactivity_disable_after: 8760h
  totp_issuer: base

webauthn:
  rp_id: localhost
  rp_display_name: Base
  rp_origins:
    - http://localhost:3000
    - http://localhost:8080

mailer:
  enabled: true
  from: no-reply@base.local
  host: localhost
  port: 2500
  username: ""
  password: ""
  require_tls: false

scheduler:
  enabled: true
  email_outbox_every: 1m
  cleanup_every: 1h
  inactivity_check_every: 24h