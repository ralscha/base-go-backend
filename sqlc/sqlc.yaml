version: "2"
sql:
  - engine: postgresql
    schema:
      - ../db/migrations
    queries:
      - ../db/queries
    gen:
      go:
        package: sqlc
        out: ../internal/store/sqlc
        sql_package: database/sql
        emit_interface: false
        emit_json_tags: false
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.int8"
            go_type: "int64"